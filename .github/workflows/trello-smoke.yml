name: Trello Smoke Checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  trello-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Static site reference check
        run: npm run test:static

      - name: Trello core smoke check
        run: npm run test:smoke

      - name: Trello phase extension smoke check
        run: npm run test:trello-phases
