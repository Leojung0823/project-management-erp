<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project ERP｜Supabase 雲端版</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--text:#172033;--muted:#697386;--line:#dde4ef;--brand:#2563eb;--ok:#16a34a;--warn:#f59e0b;--danger:#dc2626;--soft:#eff6ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}.app{max-width:1180px;margin:auto;padding:24px}.top{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:18px}.brand h1{margin:0;font-size:28px}.brand p{margin:6px 0 0;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:700}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.danger{background:#fff;color:var(--danger)}.btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 18px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;cursor:pointer;color:var(--muted);font-weight:700}.tab.active{background:var(--brand);border-color:var(--brand);color:#fff}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 22px rgba(16,24,40,.04)}.kpi .label{color:var(--muted);font-size:13px}.kpi .value{font-size:28px;font-weight:900;margin-top:8px}.layout{display:grid;grid-template-columns:360px 1fr;gap:14px}.form{display:grid;gap:10px}label{font-size:13px;color:var(--muted);font-weight:700}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;background:#fff}textarea{min-height:72px;resize:vertical}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}.item-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.item h3{margin:0 0 4px;font-size:17px}.meta{color:var(--muted);font-size:13px;line-height:1.6}.pill{display:inline-flex;align-items:center;border-radius:999px;background:var(--soft);color:var(--brand);font-size:12px;font-weight:800;padding:5px 9px}.pill.ok{background:#dcfce7;color:var(--ok)}.pill.warn{background:#fef3c7;color:var(--warn)}.pill.danger{background:#fee2e2;color:var(--danger)}.mini{font-size:12px;padding:7px 9px;border-radius:10px}.empty{padding:30px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:var(--muted);background:#fff}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hint{font-size:13px;color:var(--muted);line-height:1.7}.footer{margin-top:20px;color:var(--muted);font-size:13px}.sync{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0}.dot{width:10px;height:10px;border-radius:999px;background:var(--warn)}.dot.cloud{background:var(--ok)}.dot.error{background:var(--danger)}.setup{border:1px solid #bfdbfe;background:#eff6ff}.setup h2{margin-top:0}.setup-code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;background:#0f172a;color:#e2e8f0;border-radius:12px;padding:12px;overflow:auto}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.blocked{border-color:#fbbf24;background:#fffbeb}.hidden{display:none!important}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:560px){.app{padding:14px}.grid{grid-template-columns:1fr}.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <div class="brand">
        <h1>Project ERP｜專案管理系統</h1>
        <p>Supabase 雲端版：已關閉本機資料模式，所有新增與異動都必須寫入 Supabase。</p>
        <div class="sync"><span id="syncDot" class="dot"></span><strong id="syncMode">尚未連線</strong><span id="syncText" class="hint">請先連線 Supabase 才能使用系統</span></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="exportData()">匯出雲端備份</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">匯入到雲端</button>
        <input id="importFile" type="file" accept="application/json" hidden onchange="importData(event)">
        <button class="btn danger" onclick="resetDemo()">建立示範資料到 Supabase</button>
      </div>
    </section>

    <section id="supabaseSetup" class="card setup"></section>
    <section class="grid" id="kpis"></section>
    <nav class="tabs" id="tabs"></nav>
    <section id="view"></section>
    <p class="footer">資料僅透過 Supabase Auth 匿名登入與 RLS 存取。此頁不再保存 ERP 業務資料到 localStorage；localStorage 只暫存 Supabase 連線設定與 Supabase Auth session。</p>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const CONFIG_KEY = 'project-erp-supabase-config';
    const tabs = [['dashboard','儀表板'],['projects','專案'],['tasks','任務'],['clients','客戶'],['invoices','帳款']];
    const projectStatus = {planning:'規劃中',active:'進行中',risk:'風險中',paused:'暫停',done:'完成'};
    const taskStatus = {todo:'待辦',doing:'進行中',review:'待審核',done:'完成'};
    const invoiceStatus = {draft:'草稿',sent:'已送出',paid:'已收款',overdue:'逾期'};
    const priorityText = {low:'低',normal:'一般',high:'高',urgent:'急件'};
    const emptyStore = () => ({clients:[],projects:[],tasks:[],invoices:[]});

    let state = emptyStore();
    let active = 'dashboard';
    let client = null;
    let cloud = false;
    let syncMessage = '請先連線 Supabase 才能使用系統';
    let syncError = false;

    function uid(prefix){return prefix + '-' + crypto.randomUUID().slice(0,8)}
    function money(n){return 'NT$ ' + Number(n||0).toLocaleString('zh-TW')}
    function today(){return new Date().toISOString().slice(0,10)}
    function escapeHtml(value){return String(value ?? '').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    function isEmpty(s){return s.projects.length===0&&s.tasks.length===0&&s.clients.length===0&&s.invoices.length===0}
    function seed(){const c1=uid('client'),c2=uid('client'),p1=uid('project'),p2=uid('project');return {clients:[{id:c1,name:'迎暉光電股份有限公司',contact:'採購窗口',phone:'',email:'',industry:'光電材料'},{id:c2,name:'內部專案',contact:'Leo',phone:'',email:'',industry:'公司內部'}],projects:[{id:p1,code:'PM-2606-001',name:'品牌官網改版',clientId:c1,manager:'Leo',budget:180000,cost:0,status:'active',priority:'high',progress:30,deadline:'2026-07-20',notes:'首頁、產品頁、詢價表單'},{id:p2,code:'PM-2606-002',name:'辦公室裝修管理',clientId:c2,manager:'Leo',budget:850000,cost:0,status:'planning',priority:'urgent',progress:10,deadline:'2026-08-15',notes:'天花板、照明、消防、弱電、廁所'}],tasks:[{id:uid('task'),projectId:p1,title:'確認網站主視覺方向',owner:'設計',status:'todo',priority:'high',dueDate:'2026-06-28',estimateHours:3},{id:uid('task'),projectId:p2,title:'整理裝修預算表',owner:'行政',status:'doing',priority:'urgent',dueDate:'2026-06-30',estimateHours:4}],invoices:[{id:uid('invoice'),projectId:p1,title:'官網設計首付款',amount:60000,status:'sent',dueDate:'2026-07-05'},{id:uid('invoice'),projectId:p2,title:'裝修第一期工程款',amount:250000,status:'draft',dueDate:'2026-07-10'}]}}

    async function save(){
      if(!cloud || !client){alert('Supabase 尚未連線。此版本已關閉本機模式，請先連線 Supabase。');render();return;}
      render();setSync('正在同步到 Supabase...',true,false);
      try{await pushCloud();setSync('Supabase 已同步：'+new Date().toLocaleTimeString('zh-TW'),true,false)}catch(e){setSync('Supabase 同步失敗：'+message(e),true,true)}
    }
    function message(e){return e instanceof Error?e.message:String(e)}
    function setSync(text,isCloud=cloud,isError=false){syncMessage=text;syncError=isError;document.getElementById('syncMode').textContent=isCloud?'Supabase 雲端模式':'尚未連線';document.getElementById('syncText').textContent=text;document.getElementById('syncDot').className='dot '+(isError?'error':isCloud?'cloud':'')}

    async function connectSupabase(event){event?.preventDefault();const url=document.getElementById('sbUrl')?.value?.trim();const key=document.getElementById('sbKey')?.value?.trim();if(!url||!key){alert('請填 Supabase URL 與 anon/publishable key');return}localStorage.setItem(CONFIG_KEY,JSON.stringify({url,key}));await bootSupabase({url,key})}
    async function bootSupabase(config){try{setSync('正在連線 Supabase...',false,false);client=createClient(config.url,config.key,{auth:{autoRefreshToken:true,persistSession:true,detectSessionInUrl:true}});const {data:{session}}=await client.auth.getSession();if(!session){const {error}=await client.auth.signInAnonymously();if(error)throw new Error('匿名登入失敗：'+error.message+'。請確認 Supabase Auth 已啟用 Anonymous Sign-Ins。')}state=await readCloud();cloud=true;setSync(isEmpty(state)?'Supabase 已連線。雲端目前沒有資料，請先新增客戶/專案，或建立示範資料。':'Supabase 已連線，正在使用雲端資料',true,false);render()}catch(e){cloud=false;client=null;state=emptyStore();setSync('Supabase 連線失敗：'+message(e),false,true);render()}}
    function disconnectSupabase(){if(!confirm('要清除 Supabase 連線設定嗎？這不會刪除 Supabase 雲端資料。'))return;localStorage.removeItem(CONFIG_KEY);client=null;cloud=false;state=emptyStore();setSync('已清除連線設定，請重新填入 Supabase URL / key',false,false);render()}
    function tableError(result,name){if(result.error)throw new Error(name+' 失敗：'+result.error.message+'。請先在 Supabase SQL Editor 執行 supabase/schema.sql')}
    async function readCloud(){const [c,p,t,i]=await Promise.all([client.from('clients').select('id,name,contact,phone,email,industry').order('name'),client.from('projects').select('id,code,name,client_id,manager,budget,cost,status,priority,progress,deadline,notes').order('deadline'),client.from('tasks').select('id,project_id,title,owner,status,priority,due_date,estimate_hours').order('due_date'),client.from('invoices').select('id,project_id,title,amount,status,due_date').order('due_date')]);tableError(c,'讀取客戶');tableError(p,'讀取專案');tableError(t,'讀取任務');tableError(i,'讀取帳款');return {clients:(c.data||[]).map(x=>({id:x.id,name:x.name,contact:x.contact||'',phone:x.phone||'',email:x.email||'',industry:x.industry||''})),projects:(p.data||[]).map(x=>({id:x.id,code:x.code,name:x.name,clientId:x.client_id,manager:x.manager||'',budget:Number(x.budget||0),cost:Number(x.cost||0),status:x.status,priority:x.priority,progress:Number(x.progress||0),deadline:String(x.deadline).slice(0,10),notes:x.notes||''})),tasks:(t.data||[]).map(x=>({id:x.id,projectId:x.project_id,title:x.title,owner:x.owner||'',status:x.status,priority:x.priority,dueDate:String(x.due_date).slice(0,10),estimateHours:Number(x.estimate_hours||1)})),invoices:(i.data||[]).map(x=>({id:x.id,projectId:x.project_id,title:x.title,amount:Number(x.amount||0),status:x.status,dueDate:String(x.due_date).slice(0,10)}))}}
    async function del(table,userId){const r=await client.from(table).delete().eq('owner_id',userId);tableError(r,'清除 '+table)}
    async function ins(table,rows){if(!rows.length)return;const r=await client.from(table).insert(rows);tableError(r,'寫入 '+table)}
    async function pushCloud(){const {data:{session}}=await client.auth.getSession();if(!session)throw new Error('沒有 Supabase session');const userId=session.user.id;await del('invoices',userId);await del('tasks',userId);await del('projects',userId);await del('clients',userId);await ins('clients',state.clients.map(c=>({id:c.id,name:c.name,contact:c.contact,phone:c.phone,email:c.email,industry:c.industry})));await ins('projects',state.projects.map(p=>({id:p.id,code:p.code,name:p.name,client_id:p.clientId,manager:p.manager,budget:p.budget,cost:p.cost,status:p.status,priority:p.priority,progress:p.progress,deadline:p.deadline,notes:p.notes})));await ins('tasks',state.tasks.map(t=>({id:t.id,project_id:t.projectId,title:t.title,owner:t.owner,status:t.status,priority:t.priority,due_date:t.dueDate,estimate_hours:t.estimateHours})));await ins('invoices',state.invoices.map(i=>({id:i.id,project_id:i.projectId,title:i.title,amount:i.amount,status:i.status,due_date:i.dueDate})))}

    function render(){renderSync();renderSetup();if(!cloud){document.getElementById('kpis').innerHTML='';document.getElementById('tabs').innerHTML='';document.getElementById('view').innerHTML=`<section class="card blocked"><h2>請先連線 Supabase</h2><p class="hint">本機模式已關閉。系統不會把專案、任務、客戶或帳款存在瀏覽器本機。請填入 Supabase Project URL 與 Publishable / anon key 後再開始使用。</p></section>`;return}renderTabs();renderKpis();document.getElementById('view').innerHTML=views[active]()}
    function renderSync(){setTimeout(()=>setSync(syncMessage,cloud,syncError),0)}
    function renderSetup(){const cfg=JSON.parse(localStorage.getItem(CONFIG_KEY)||'null');document.getElementById('supabaseSetup').innerHTML=cloud?`<h2>Supabase 已連線</h2><p class="hint">目前為雲端模式，所有資料直接同步到 Supabase。正式版下一步建議改為 Email / Google 登入與團隊權限。</p><div class="toolbar"><button class="btn" onclick="disconnectSupabase()">清除連線設定</button><button class="btn ok" onclick="resetDemo()">建立示範資料到 Supabase</button></div>`:`<h2>Supabase 雲端同步設定</h2><p class="hint">本機模式已關閉。請先在 Supabase SQL Editor 執行 repo 內的 <code>supabase/schema.sql</code>，並在 Authentication 啟用 Anonymous Sign-Ins。再填 Project URL 與 anon/publishable key。</p><form class="form" onsubmit="connectSupabase(event)"><label>Supabase Project URL<input id="sbUrl" value="${escapeHtml(cfg?.url||'')}" placeholder="https://xxxx.supabase.co" required></label><label>Anon / Publishable Key<input id="sbKey" value="${escapeHtml(cfg?.key||'')}" placeholder="sb_publishable_... 或 anon key" required></label><div class="toolbar"><button class="btn primary">連線 Supabase</button>${cfg?'<button type="button" class="btn" onclick="disconnectSupabase()">清除設定</button>':''}</div></form>`}
    function renderTabs(){document.getElementById('tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab ${active===id?'active':''}" onclick="setTab('${id}')">${label}</button>`).join('')}
    function renderKpis(){const income=state.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+Number(i.amount||0),0);const receivable=state.invoices.filter(i=>i.status!=='paid').reduce((s,i)=>s+Number(i.amount||0),0);const doing=state.tasks.filter(t=>t.status==='doing').length;document.getElementById('kpis').innerHTML=[['專案數',state.projects.length],['進行中任務',doing],['已收款',money(income)],['待收款',money(receivable)]].map(([l,v])=>`<div class="card kpi"><div class="label">${l}</div><div class="value">${v}</div></div>`).join('')}
    function pill(type,status){const label=(type==='project'?projectStatus:type==='task'?taskStatus:invoiceStatus)[status]||status;const cls=status==='done'||status==='paid'?'ok':status==='risk'||status==='overdue'?'danger':status==='doing'||status==='sent'?'warn':'';return `<span class="pill ${cls}">${label}</span>`}
    function clientName(id){return state.clients.find(c=>c.id===id)?.name||'未指定客戶'}
    function projectName(id){return state.projects.find(p=>p.id===id)?.name||'未指定專案'}
    function setTab(id){active=id;render()}
    function remove(type,id){if(confirm('確定刪除？刪除後會同步到 Supabase。')){state[type]=state[type].filter(x=>x.id!==id);save()}}
    function setStatus(type,id,status){state[type]=state[type].map(x=>x.id===id?{...x,status}:x);save()}

    const views={dashboard(){return `<div class="layout"><div class="card"><h2>今日重點</h2><p class="hint">目前為 Supabase 雲端版。若列表為空，請先新增客戶，再建立專案、任務與帳款。</p><button class="btn primary" onclick="setTab('clients')">先新增客戶</button></div><div class="card"><h2>近期任務</h2><div class="list">${state.tasks.slice(0,6).map(taskItem).join('')||empty('還沒有任務')}</div></div></div>`},projects(){return `<div class="layout"><div class="card"><h2>新增專案</h2>${projectForm()}</div><div class="card"><h2>專案列表</h2><div class="list">${state.projects.map(projectItem).join('')||empty('還沒有專案')}</div></div></div>`},tasks(){return `<div class="layout"><div class="card"><h2>新增任務</h2>${taskForm()}</div><div class="card"><h2>任務看板</h2><div class="list">${state.tasks.map(taskItem).join('')||empty('還沒有任務')}</div></div></div>`},clients(){return `<div class="layout"><div class="card"><h2>新增客戶</h2>${clientForm()}</div><div class="card"><h2>客戶資料</h2><div class="list">${state.clients.map(clientItem).join('')||empty('還沒有客戶')}</div></div></div>`},invoices(){return `<div class="layout"><div class="card"><h2>新增帳款</h2>${invoiceForm()}</div><div class="card"><h2>帳款列表</h2><div class="list">${state.invoices.map(invoiceItem).join('')||empty('還沒有帳款')}</div></div></div>`}}
    function empty(text){return `<div class="empty">${text}</div>`}
    function projectOptions(){return state.projects.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('')}
    function clientOptions(){return state.clients.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
    function projectForm(){return `<form class="form" onsubmit="addProject(event)"><label>專案名稱<input name="name" required></label><label>客戶<select name="clientId">${clientOptions()}</select></label><div class="two"><label>負責人<input name="manager"></label><label>預算<input name="budget" type="number" min="0"></label></div><div class="two"><label>優先級<select name="priority"><option value="normal">一般</option><option value="high">高</option><option value="urgent">急件</option><option value="low">低</option></select></label><label>期限<input name="deadline" type="date" value="${today()}"></label></div><label>備註<textarea name="notes"></textarea></label><button class="btn primary">新增專案</button></form>`}
    function taskForm(){return `<form class="form" onsubmit="addTask(event)"><label>任務名稱<input name="title" required></label><label>專案<select name="projectId">${projectOptions()}</select></label><div class="two"><label>負責人<input name="owner"></label><label>期限<input name="dueDate" type="date" value="${today()}"></label></div><div class="two"><label>狀態<select name="status"><option value="todo">待辦</option><option value="doing">進行中</option><option value="review">待審核</option><option value="done">完成</option></select></label><label>優先級<select name="priority"><option value="normal">一般</option><option value="high">高</option><option value="urgent">急件</option><option value="low">低</option></select></label></div><button class="btn primary">新增任務</button></form>`}
    function clientForm(){return `<form class="form" onsubmit="addClient(event)"><label>客戶名稱<input name="name" required></label><div class="two"><label>聯絡人<input name="contact"></label><label>電話<input name="phone"></label></div><div class="two"><label>Email<input name="email" type="email"></label><label>產業<input name="industry"></label></div><button class="btn primary">新增客戶</button></form>`}
    function invoiceForm(){return `<form class="form" onsubmit="addInvoice(event)"><label>帳款名稱<input name="title" required></label><label>專案<select name="projectId">${projectOptions()}</select></label><div class="two"><label>金額<input name="amount" type="number" min="0" required></label><label>狀態<select name="status"><option value="draft">草稿</option><option value="sent">已送出</option><option value="paid">已收款</option><option value="overdue">逾期</option></select></label></div><label>到期日<input name="dueDate" type="date" value="${today()}"></label><button class="btn primary">新增帳款</button></form>`}
    function projectItem(p){return `<article class="item"><div class="item-head"><div><h3>${escapeHtml(p.name)}</h3><div class="meta">${escapeHtml(p.code)} · ${escapeHtml(clientName(p.clientId))} · ${escapeHtml(p.manager)} · 截止 ${p.deadline}</div></div>${pill('project',p.status)}</div><p class="hint">預算 ${money(p.budget)}｜進度 ${p.progress}%｜${escapeHtml(p.notes)}</p><div class="toolbar"><select onchange="setStatus('projects','${p.id}',this.value)">${Object.entries(projectStatus).map(([k,v])=>`<option value="${k}" ${p.status===k?'selected':''}>${v}</option>`).join('')}</select><button class="btn mini danger" onclick="remove('projects','${p.id}')">刪除</button></div></article>`}
    function taskItem(t){return `<article class="item"><div class="item-head"><div><h3>${escapeHtml(t.title)}</h3><div class="meta">${escapeHtml(projectName(t.projectId))} · ${escapeHtml(t.owner)} · ${priorityText[t.priority]} · ${t.dueDate}</div></div>${pill('task',t.status)}</div><div class="toolbar"><select onchange="setStatus('tasks','${t.id}',this.value)">${Object.entries(taskStatus).map(([k,v])=>`<option value="${k}" ${t.status===k?'selected':''}>${v}</option>`).join('')}</select><button class="btn mini danger" onclick="remove('tasks','${t.id}')">刪除</button></div></article>`}
    function clientItem(c){return `<article class="item"><div class="item-head"><div><h3>${escapeHtml(c.name)}</h3><div class="meta">${escapeHtml(c.contact)}｜${escapeHtml(c.phone)}｜${escapeHtml(c.email)}｜${escapeHtml(c.industry)}</div></div><button class="btn mini danger" onclick="remove('clients','${c.id}')">刪除</button></div></article>`}
    function invoiceItem(i){return `<article class="item"><div class="item-head"><div><h3>${escapeHtml(i.title)}</h3><div class="meta">${escapeHtml(projectName(i.projectId))} · ${money(i.amount)} · 到期 ${i.dueDate}</div></div>${pill('invoice',i.status)}</div><div class="toolbar"><select onchange="setStatus('invoices','${i.id}',this.value)">${Object.entries(invoiceStatus).map(([k,v])=>`<option value="${k}" ${i.status===k?'selected':''}>${v}</option>`).join('')}</select><button class="btn mini danger" onclick="remove('invoices','${i.id}')">刪除</button></div></article>`}

    function addProject(e){e.preventDefault();const f=new FormData(e.target);state.projects.unshift({id:uid('project'),code:'PM-'+new Date().getFullYear().toString().slice(2)+String(state.projects.length+1).padStart(3,'0'),name:f.get('name')||'未命名專案',clientId:f.get('clientId')||state.clients[0]?.id||'',manager:f.get('manager')||'',budget:Number(f.get('budget')||0),cost:0,status:'planning',priority:f.get('priority')||'normal',progress:0,deadline:f.get('deadline')||today(),notes:f.get('notes')||''});e.target.reset();save()}
    function addTask(e){e.preventDefault();const f=new FormData(e.target);state.tasks.unshift({id:uid('task'),projectId:f.get('projectId')||state.projects[0]?.id||'',title:f.get('title')||'未命名任務',owner:f.get('owner')||'',status:f.get('status')||'todo',priority:f.get('priority')||'normal',dueDate:f.get('dueDate')||today(),estimateHours:1});e.target.reset();save()}
    function addClient(e){e.preventDefault();const f=new FormData(e.target);state.clients.unshift({id:uid('client'),name:f.get('name')||'未命名客戶',contact:f.get('contact')||'',phone:f.get('phone')||'',email:f.get('email')||'',industry:f.get('industry')||''});e.target.reset();save()}
    function addInvoice(e){e.preventDefault();const f=new FormData(e.target);state.invoices.unshift({id:uid('invoice'),projectId:f.get('projectId')||state.projects[0]?.id||'',title:f.get('title')||'未命名帳款',amount:Number(f.get('amount')||0),status:f.get('status')||'draft',dueDate:f.get('dueDate')||today()});e.target.reset();save()}
    function exportData(){if(!cloud){alert('請先連線 Supabase');return}const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='project-erp-supabase-backup.json';a.click();URL.revokeObjectURL(a.href)}
    function importData(e){if(!cloud){alert('請先連線 Supabase');return}const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{state=JSON.parse(reader.result);save()}catch(err){alert('備份檔格式錯誤')}};reader.readAsText(file)}
    function resetDemo(){if(!cloud){alert('請先連線 Supabase');return}if(confirm('確定建立示範資料？這會覆蓋目前 Supabase 工作區資料。')){state=seed();save()}}

    Object.assign(window,{connectSupabase,disconnectSupabase,setTab,remove,setStatus,addProject,addTask,addClient,addInvoice,exportData,importData,resetDemo});
    const savedConfig=JSON.parse(localStorage.getItem(CONFIG_KEY)||'null');
    render();
    if(savedConfig) bootSupabase(savedConfig);
  </script>
</body>
</html>
