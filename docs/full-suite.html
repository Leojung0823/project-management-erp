<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project ERP Full Suite</title><style>:root{--b:#f5f7fb;--p:#fff;--t:#172033;--m:#64748b;--l:#dbe3ef;--x:#2563eb;--g:#16a34a;--r:#dc2626;--w:#f59e0b}*{box-sizing:border-box}body{margin:0;background:var(--b);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Arial,sans-serif}.app{max-width:1320px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.card{background:var(--p);border:1px solid var(--l);border-radius:18px;padding:16px;box-shadow:0 8px 22px rgba(16,24,40,.04)}.muted{color:var(--m);line-height:1.65}.bar,.tabs{display:flex;gap:8px;flex-wrap:wrap}.btn,.tab{border:1px solid var(--l);background:#fff;border-radius:12px;padding:9px 12px;font-weight:800;cursor:pointer}.btn.primary,.tab.on{background:var(--x);border-color:var(--x);color:#fff}.btn.ok{background:var(--g);border-color:var(--g);color:#fff}.btn.danger{color:var(--r)}.setup{background:#eff6ff;border-color:#bfdbfe;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}.kpi small{display:block;color:var(--m);font-weight:800}.kpi b{font-size:25px}.layout{display:grid;grid-template-columns:330px 1fr;gap:14px}.form{display:grid;gap:10px}label{font-size:13px;color:var(--m);font-weight:800}input,select,textarea{width:100%;border:1px solid var(--l);border-radius:12px;padding:10px;font:inherit;background:#fff}textarea{min-height:74px}.list{display:grid;gap:10px}.item{background:#fff;border:1px solid var(--l);border-radius:16px;padding:14px}.head{display:flex;justify-content:space-between;gap:10px}.item h3{margin:0 0 4px}.meta{color:var(--m);font-size:13px;line-height:1.6}.pill{border-radius:999px;padding:5px 9px;background:#e0f2fe;color:#0369a1;font-size:12px;font-weight:900}.pill.ok{background:#dcfce7;color:#15803d}.pill.bad{background:#fee2e2;color:#b91c1c}.pill.warn{background:#fef3c7;color:#b45309}.empty{padding:28px;border:1px dashed var(--l);border-radius:16px;text-align:center;color:var(--m);background:#fff}.dot{display:inline-block;width:10px;height:10px;border-radius:99px;background:var(--w);margin-right:6px}.dot.ok{background:var(--g)}.dot.bad{background:var(--r)}@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.top{flex-direction:column}}@media(max-width:560px){.grid{grid-template-columns:1fr}.app{padding:14px}}</style></head><body><main class="app"><section class="top"><div><h1>Project ERP｜全模組 PM ERP</h1><p class="muted">Supabase-only。客戶、商機、報價、合約、專案、里程碑、任務、工時、風險、問題、變更、會議、請款、收款、支出、採購、文件、通知、團隊權限與稽核紀錄都寫入 Supabase。</p><p><span id="dot" class="dot"></span><b id="mode">尚未連線</b> <span id="msg" class="muted">請連線 Supabase</span></p></div><div class="bar"><button class="btn" onclick="APP.export()">匯出備份</button><button class="btn" onclick="imp.click()">匯入備份</button><input id="imp" type="file" hidden accept="application/json" onchange="APP.import(event)"><button class="btn ok" onclick="APP.seed()">建立示範資料</button></div></section><section id="setup" class="card setup"></section><section id="kpi" class="grid"></section><nav id="tabs" class="tabs"></nav><section id="view"></section><p class="muted">版本 full-suite-2026-06-24-2。請先在 Supabase SQL Editor 執行 supabase/full-suite-schema.sql。</p></main><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';let spec=[],mods={},db=null,cloud=false,records=[],logs=[],active='dashboard',edit='',q='';const C='pm-erp-full-config',S=['新建','處理中','待審核','已完成','逾期','取消'];const $=x=>document.getElementById(x),H=s=>String(s??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m])),uid=()=>crypto.randomUUID(),money=n=>'NT$ '+Number(n||0).toLocaleString('zh-TW'),today=()=>new Date().toISOString().slice(0,10);function msg(t,ok=cloud,bad=false){$('mode').textContent=ok?'Supabase 雲端模式':'尚未連線';$('msg').textContent=t;$('dot').className='dot '+(bad?'bad':ok?'ok':'')}async function init(){const j=await fetch('erp-full-suite-spec.json?20260624').then(r=>r.json());spec=j.modules;mods=Object.fromEntries(spec.map(m=>[m.key,m]));const c=JSON.parse(localStorage.getItem(C)||'null');if(c)connect(null,c);else render()}async function connect(e,cfg){e?.preventDefault();const url=cfg?.url||$('url').value.trim(),key=cfg?.key||$('key').value.trim();if(!url||!key)return alert('請填 Supabase URL 與 Publishable / anon key');localStorage.setItem(C,JSON.stringify({url,key}));try{msg('連線中...',false);db=createClient(url,key,{auth:{autoRefreshToken:true,persistSession:true,detectSessionInUrl:true}});let{data:{session}}=await db.auth.getSession();if(!session){let{error}=await db.auth.signInAnonymously();if(error)throw error}cloud=true;await load();msg('已連線，全模組可使用',true);render()}catch(e){cloud=false;db=null;msg('連線失敗：'+e.message,false,true);render()}}async function load(){let r=await db.from('erp_records').select('id,module,data,created_at,updated_at').order('updated_at',{ascending:false});if(r.error)throw Error('讀取 erp_records 失敗：請先執行 supabase/full-suite-schema.sql。'+r.error.message);records=r.data||[];let a=await db.from('erp_activity').select('id,module,record_id,action,note,created_at').order('created_at',{ascending:false}).limit(100);logs=a.data||[]}function rows(m){return records.filter(r=>r.module===m)}function by(id){return records.find(r=>r.id===id)}function sum(m,k){return rows(m).reduce((s,r)=>s+Number(r.data?.[k]||0),0)}async function log(m,id,a,n){await db.from('erp_activity').insert({id:uid(),module:m,record_id:id,action:a,note:n||''})}async function save(m,data,id){if(!cloud)return alert('本機模式已關閉，請先連線 Supabase');let rec={id:id||uid(),module:m,data:{...data,updated:today()}};let r=await db.from('erp_records').upsert(rec);if(r.error)return alert('儲存失敗：'+r.error.message);await log(m,rec.id,id?'更新':'新增',data.name||data['客戶名稱']||'');edit='';await load();render()}async function del(id){if(!confirm('確定刪除？'))return;let r=by(id);let x=await db.from('erp_records').delete().eq('id',id);if(x.error)return alert(x.error.message);await log(r?.module||'',id,'刪除',r?.data?.name||'');await load();render()}async function status(id,s){let r=by(id);r.data.status=s;await save(r.module,r.data,id)}function render(){setup();if(!cloud){$('kpi').innerHTML='';$('tabs').innerHTML='';$('view').innerHTML='<section class="card"><h2>請先連線 Supabase</h2><p class="muted">本機模式已關閉。必須執行 full-suite-schema.sql 並連線後才能使用。</p></section>';return}kpi();tabs();$('view').innerHTML=active==='dashboard'?dash():active==='activity'?act():view(active)}function setup(){let c=JSON.parse(localStorage.getItem(C)||'null');$('setup').innerHTML=cloud?'<h2>Supabase 已連線</h2><p class="muted">使用 erp_records / erp_activity。所有資料皆在雲端。</p><div class="bar"><button class="btn" onclick="APP.reload()">重新整理</button><button class="btn danger" onclick="APP.disconnect()">清除連線設定</button></div>':`<h2>Supabase 連線設定</h2><p class="muted">貼 Project URL 與 Publishable key，不要貼 Secret key。</p><form class="form" onsubmit="APP.connect(event)"><label>Supabase URL<input id="url" required value="${H(c?.url||'')}" placeholder="https://xxxx.supabase.co"></label><label>Publishable / anon key<input id="key" required value="${H(c?.key||'')}" placeholder="sb_publishable_..."></label><button class="btn primary">連線 Supabase</button></form>`}function kpi(){let paid=sum('payments','收款金額'),inv=sum('invoices','金額'),exp=sum('expenses','金額'),risk=rows('risks').filter(r=>!/已完成|取消/.test(r.data.status||'')).length;let data=[['專案',rows('projects').length],['待收款',money(Math.max(inv-paid,0))],['已收款',money(paid)],['毛利估算',money(paid-exp)],['任務',rows('tasks').length],['風險',risk],['商機金額',money(sum('opportunities','預估金額'))],['支出',money(exp)]];$('kpi').innerHTML=data.map(x=>`<div class="card kpi"><small>${x[0]}</small><b>${x[1]}</b></div>`).join('')}function tabs(){let t=[{key:'dashboard',label:'老闆總覽'},...spec,{key:'activity',label:'稽核紀錄'}];$('tabs').innerHTML=t.map(m=>`<button class="tab ${active===m.key?'on':''}" onclick="APP.tab('${m.key}')">${m.label}</button>`).join('')}function dash(){let urgent=records.filter(r=>/逾期|風險|卡關|急件/.test(JSON.stringify(r.data))).slice(0,8);return `<div class="layout"><section class="card"><h2>老闆重點</h2><p class="muted">待收款、毛利、任務、風險與最近更新。</p><div class="list">${urgent.map(card).join('')||empty('目前沒有急件')}</div></section><section class="card"><h2>最近更新</h2><div class="list">${records.slice(0,12).map(card).join('')||empty('尚無資料')}</div></section></div>`}function view(k){let m=mods[k],list=rows(k).filter(r=>JSON.stringify(r.data).toLowerCase().includes(q.toLowerCase()));return `<div class="layout"><section class="card"><h2>${edit?'編輯':'新增'}${m.label}</h2>${form(k,edit?by(edit):null)}</section><section class="card"><h2>${m.label}列表</h2><input placeholder="搜尋" oninput="APP.search(this.value)" value="${H(q)}"><br><br><div class="list">${list.map(card).join('')||empty('尚無資料')}</div></section></div>`}function form(k,r){let m=mods[k],d=r?.data||{},fs=m.fields.map(f=>field(f,d)).join('');return `<form class="form" onsubmit="APP.submit(event,'${k}','${r?.id||''}')"><label>狀態<select name="status">${S.map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('')}</select></label>${fs}<button class="btn primary">儲存</button>${r?'<button type="button" class="btn" onclick="APP.cancel()">取消編輯</button>':''}</form>`}function typeOf(l){return /金額|稅額|成本|預算|進度|工時|天數|率/.test(l)?'number':/日|期限|到期|簽約|開始|結束|到貨/.test(l)?'date':'text'}function field(l,d){let v=d[l]||'';if(/備註|原因|解法|內容|摘要|決議|待辦|處理|規格|說明|清單/.test(l))return `<label>${l}<textarea name="${l}">${H(v)}</textarea></label>`;return `<label>${l}<input name="${l}" type="${typeOf(l)}" value="${H(v)}"></label>`}function card(r){let d=r.data||{},m=mods[r.module]||{label:r.module},name=d[Object.keys(d).find(k=>/名稱|姓名|主題|紀錄|項目|標題/.test(k))]||d.name||'未命名',cls=/已完成|已收款|已入帳|已核准/.test(d.status)?'ok':/逾期|取消|駁回|流失/.test(d.status)?'bad':'warn';let meta=Object.entries(d).filter(([k,v])=>k!=='status'&&k!==name&&v).slice(0,5).map(([k,v])=>`${H(k)}：${H(v)}`).join('｜');return `<article class="item"><div class="head"><div><h3>${H(name)}</h3><div class="meta">${H(m.label)}｜${meta}</div></div><span class="pill ${cls}">${H(d.status||'')}</span></div><div class="bar"><button class="btn" onclick="APP.edit('${r.id}')">編輯</button><select onchange="APP.status('${r.id}',this.value)">${S.map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('')}</select><button class="btn danger" onclick="APP.del('${r.id}')">刪除</button></div></article>`}function act(){return `<section class="card"><h2>稽核紀錄</h2><div class="list">${logs.map(a=>`<article class="item"><h3>${H(a.action)}｜${H(mods[a.module]?.label||a.module)}</h3><div class="meta">${new Date(a.created_at).toLocaleString('zh-TW')}｜${H(a.note)}</div></article>`).join('')||empty('尚無紀錄')}</div></section>`}function empty(t){return `<div class="empty">${t}</div>`}async function submit(e,k,id){e.preventDefault();let fd=new FormData(e.target),d={};for(let[x,y]of fd.entries())d[x]=y;await save(k,d,id)}async function seed(){let s=[['members',{'姓名':'Leo','角色':'老闆','Email':'','電話':'','備註':'系統管理者',status:'已完成'}],['clients',{'客戶名稱':'迎暉光電股份有限公司','負責業務':'Leo','產業':'光電材料','分級':'A級','來源':'業務開發','備註':'Barrier Film 客戶',status:'已完成'}],['opportunities',{'商機名稱':'SBR Barrier Film 樣品導入','負責業務':'Leo','預估金額':180000,'成交率':'60','下次行動':'追蹤測試結果','跟進日':today(),status:'處理中'}],['projects',{'專案名稱':'辦公室裝修與搬遷管理','PM':'Leo','預算':850000,'成本':0,'進度':'15','截止日':'2026-08-15','說明':'天花板、照明、消防、弱電、廁所',status:'處理中'}],['tasks',{'任務名稱':'建立正式 PM ERP Supabase 資料表','負責人':'Leo','優先級':'急件','期限':today(),'工時':3,'檢查清單':'執行 full-suite-schema.sql\n確認 RLS',status:'處理中'}],['invoices',{'請款名稱':'裝修第一期工程款','金額':250000,'稅額':12500,'到期日':'2026-07-10','階段':'訂金',status:'待審核'}],['risks',{'風險名稱':'消防與弱電時程延誤','負責人':'Leo','影響':'高','機率':'中','處理方式':'先確認圖審與廠商排程',status:'處理中'}]];for(let x of s)await save(x[0],x[1])}function exp(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({records,logs},null,2)],{type:'application/json'}));a.download='pm-erp-full-backup.json';a.click()}async function imp(e){let f=e.target.files[0];if(!f)return;let j=JSON.parse(await f.text());for(let r of j.records||[])await db.from('erp_records').upsert({id:r.id||uid(),module:r.module,data:r.data||{}});await load();render()}function disconnect(){localStorage.removeItem(C);cloud=false;db=null;records=[];logs=[];msg('已清除連線設定',false);render()}window.APP={connect,disconnect,reload:async()=>{await load();render()},tab:k=>{active=k;edit='';q='';render()},search:x=>{q=x;render()},submit,edit:id=>{edit=id;active=by(id).module;render()},cancel:()=>{edit='';render()},del,status,seed,export:exp,import:imp};init();</script></body></html>
